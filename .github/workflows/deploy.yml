name: Deploy API to 1hebergement

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Touch restart.txt
        run: |
          mkdir -p tmp
          date -u > tmp/restart.txt

      - name: Deploy via FTPS
        id: deploy_ftps
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /appss/pointage-api/
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git/**
            **/.github/**
            uploads/dossiers/**
            .env
            .env.*

      - name: Retry with plain FTP
        if: steps.deploy_ftps.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /appss/pointage-api/
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git/**
            **/.github/**
            uploads/dossiers/**
            .env
            .env.*